<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auction Platform</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
.hero-bg { background-color:#0d47a1; }
.btn-primary { background:#f97316;color:white;padding:10px;border-radius:6px; }
.card { background:white;border-radius:10px;box-shadow:0 4px 6px rgba(0,0,0,0.1); }
</style>
</head>

<body class="bg-gray-50">

<!-- 🔐 LOGIN / SIGNUP -->
<div id="auth-page" class="flex items-center justify-center h-screen bg-gray-100">
  <div class="bg-white p-6 rounded shadow w-80">
    <h2 class="text-xl font-bold mb-4 text-center">Login / Signup</h2>

    <input id="email" placeholder="Email" class="border p-2 w-full mb-2">
    <input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-3">

    <button onclick="signup()" class="bg-blue-500 text-white w-full p-2 mb-2">Sign Up</button>
    <button onclick="login()" class="bg-green-500 text-white w-full p-2">Login</button>
  </div>
</div>

<!-- 🌐 MAIN WEBSITE (YOUR UI) -->
<div id="main-site" style="display:none;">

<header class="bg-white shadow p-4 flex justify-between">
  <h1 class="text-xl font-bold text-blue-800">LOGO</h1>
  <button onclick="logout()" class="bg-red-500 text-white px-3 py-1 rounded">Logout</button>
</header>

<section class="hero-bg text-white p-10 text-center">
  <h1 class="text-4xl font-bold">Flood Damaged Vehicles</h1>
  <p class="text-xl">Cars priced to excite</p>
</section>

<section class="p-6">
  <h2 class="text-2xl font-bold text-center mb-4">Latest Auction</h2>
  <div id="auction-container" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
</section>

<section class="p-6 bg-white">
  <h2 class="text-xl font-bold text-center mb-4">Newsletter</h2>
  <form onsubmit="subscribe(event)" class="flex justify-center">
    <input name="email" placeholder="Enter email" class="border p-2">
    <button class="btn-primary ml-2">Subscribe</button>
  </form>
</section>

</div>

<script>
const SUPABASE_URL = "https://cevdmidlneuqmnjbhzjp.supabase.co";
const SUPABASE_KEY = "sb_publishable_WG4B4X3dmk2K51Jhtuwo1g_71N9dDpU";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// AUTH
async function signup(){
  const email = emailInput();
  const password = passwordInput();

  const { error } = await supabaseClient.auth.signUp({ email, password });
  alert(error ? error.message : "Signup success");
}

async function login(){
  const email = emailInput();
  const password = passwordInput();

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if(!error){
    showMain();
  } else alert(error.message);
}

async function logout(){
  await supabaseClient.auth.signOut();
  location.reload();
}

function emailInput(){ return document.getElementById("email").value; }
function passwordInput(){ return document.getElementById("password").value; }

// SHOW UI
function showMain(){
  document.getElementById("auth-page").style.display="none";
  document.getElementById("main-site").style.display="block";
  loadAuctions();
}

// LOAD AUCTIONS
async function loadAuctions(){
  const { data } = await supabaseClient.from("auctions").select("*");

  const container = document.getElementById("auction-container");
  container.innerHTML="";

  data.forEach(a=>{
    const card = document.createElement("div");
    card.className="card p-4";

    card.innerHTML=`
      <img src="${a.image_url || 'https://via.placeholder.com/300'}" class="w-full h-40 object-cover mb-2">
      <h3 class="font-bold">${a.title}</h3>
      <p>₹${a.current_price}</p>

      <input type="number" id="bid-${a.id}" class="border p-1 w-full mt-2">
      <button onclick="placeBid('${a.id}')" class="btn-primary w-full mt-2">Bid</button>
    `;

    container.appendChild(card);
  });
}

// BID
async function placeBid(id){
  const amount = document.getElementById(`bid-${id}`).value;
  const user = await supabaseClient.auth.getUser();

  if(!user.data.user){
    alert("Login first");
    return;
  }

  await supabaseClient.from("bids").insert([{
    auction_id:id,
    user_id:user.data.user.id,
    amount
  }]);

  await supabaseClient.from("auctions")
    .update({ current_price:amount })
    .eq("id",id);

  loadAuctions();
}

// NEWSLETTER
async function subscribe(e){
  e.preventDefault();
  const email = e.target.email.value;

  await supabaseClient.from("newsletter").insert([{ email }]);
  alert("Subscribed!");
}

// AUTO LOGIN CHECK
supabaseClient.auth.getSession().then(({data})=>{
  if(data.session) showMain();
});

// REALTIME
supabaseClient.channel("bids")
.on("postgres_changes",{event:"INSERT",schema:"public",table:"bids"},
()=>loadAuctions())
.subscribe();

</script>

</body>
</html>
