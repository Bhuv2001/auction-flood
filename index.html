<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auction Platform</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body class="bg-gray-100">

<!-- 🔐 AUTH -->
<div class="p-4 bg-white shadow flex gap-2">
  <input id="email" placeholder="Email" class="border p-2">
  <input id="password" type="password" placeholder="Password" class="border p-2">
  <button onclick="signup()" class="bg-blue-500 text-white px-3 py-2">Sign Up</button>
  <button onclick="login()" class="bg-green-500 text-white px-3 py-2">Login</button>
  <button onclick="logout()" class="bg-red-500 text-white px-3 py-2">Logout</button>
</div>

<!-- 🚗 AUCTIONS -->
<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Live Auctions</h1>
  <div id="auction-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
</div>

<script>
const SUPABASE_URL = "https://cevdmidlneuqmnjbhzjp.supabase.co";
const SUPABASE_KEY = "sb_publishable_WG4B4X3dmk2K51Jhtuwo1g_71N9dDpU";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔐 AUTH FUNCTIONS
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({ email, password });

  alert(error ? error.message : "Signup successful!");
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

  alert(error ? error.message : "Login successful!");
}

async function logout() {
  await supabaseClient.auth.signOut();
  alert("Logged out");
}

// 📦 LOAD AUCTIONS
async function loadAuctions() {
  const { data, error } = await supabaseClient.from("auctions").select("*");

  const container = document.getElementById("auction-list");
  container.innerHTML = "";

  if (error) {
    container.innerHTML = "Error loading auctions";
    return;
  }

  data.forEach(a => {
    const card = document.createElement("div");
    card.className = "bg-white p-4 shadow rounded";

    card.innerHTML = `
      <img src="${a.image_url || 'https://via.placeholder.com/300'}" class="w-full h-40 object-cover mb-2">
      <h2 class="font-bold">${a.title}</h2>
      <p class="mb-2">Current Price: ₹${a.current_price}</p>

      <input type="number" id="bid-${a.id}" class="border p-2 w-full" placeholder="Enter bid">
      <button onclick="placeBid('${a.id}')" class="bg-blue-600 text-white px-2 py-2 mt-2 w-full">
        Place Bid
      </button>
    `;

    container.appendChild(card);
  });
}

// 💰 PLACE BID
async function placeBid(id) {
  const amount = document.getElementById(`bid-${id}`).value;

  const user = await supabaseClient.auth.getUser();

  if (!user.data.user) {
    alert("Please login first!");
    return;
  }

  if (!amount) {
    alert("Enter bid amount");
    return;
  }

  await supabaseClient.from("bids").insert([
    {
      auction_id: id,
      user_id: user.data.user.id,
      amount: amount
    }
  ]);

  await supabaseClient
    .from("auctions")
    .update({ current_price: amount })
    .eq("id", id);

  alert("Bid placed!");
  loadAuctions();
}

// 🔴 REALTIME UPDATES
function realtime() {
  supabaseClient
    .channel("bids")
    .on("postgres_changes", {
      event: "INSERT",
      schema: "public",
      table: "bids"
    }, payload => {
      console.log("New bid:", payload);
      loadAuctions();
    })
    .subscribe();
}

// 🚀 INIT
loadAuctions();
realtime();

</script>

</body>
</html>
